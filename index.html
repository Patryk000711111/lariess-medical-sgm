<style>
:root {

}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select{font:inherit} button{cursor:pointer}
.ekg{position:fixed;inset:0;pointer-events:none;opacity:.08;overflow:hidden;z-index:0}
.ekg svg{position:absolute;top:80px;left:0;width:150%;height:220px}
.page{position:relative;z-index:1}
.wrap{max-width:1320px;margin:0 auto;padding:24px}
.logo{display:flex;align-items:center;gap:14px}
.logoMark{width:62px;height:62px;border-radius:18px;background:#0b1220;display:grid;place-items:center;box-shadow:0 8px 24px rgba(2,6,23,.18)}
.logoWord1{font-size:28px;font-weight:700;letter-spacing:.18em} .logoWord2{font-size:12px;color:var(--muted);letter-spacing:.42em;text-transform:uppercase}
.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:28px;min-height:86vh;align-items:center}
.title{font-size:54px;line-height:1.04;margin:18px 0 0;font-weight:700}
.sub{font-size:20px;line-height:1.7;color:var(--muted);max-width:860px}
.card{background:var(--card);border:1px solid var(--line);border-radius:28px;box-shadow:0 8px 30px rgba(15,23,42,.06)}
.panelCard{padding:24px} .panelTitle{font-size:28px;font-weight:700} .panelSub{margin-top:8px;color:var(--muted);line-height:1.6}
.btn{display:block;width:100%;padding:16px 18px;border:0;border-radius:20px;font-weight:600}
.btnPrimary{background:var(--primary);color:#fff} .btnDark{background:#0f172a;color:#fff} .btnGhost{background:#fff;border:1px solid var(--line)}
.stack{display:flex;flex-direction:column;gap:16px} .row{display:flex;gap:16px;flex-wrap:wrap} .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px} .grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.navLayout{display:grid;grid-template-columns:300px 1fr;min-height:100vh} .sidebar{background:#fff;border-right:1px solid var(--line);padding:20px;overflow:auto}
.navBtn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:14px 16px;border:0;background:transparent;border-radius:18px;color:#21364f}
.navBtn.active{background:var(--primary);color:#fff} .navBtn:hover{background:#eef4fb}
.topbar{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:20px}
.search{width:420px;max-width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:18px;background:#fff}
.content{padding:20px} .kpi{padding:20px} .kpiValue{font-size:42px;font-weight:700;margin-top:8px} .small{font-size:14px;color:var(--muted)}
.tableWrap{overflow:auto} table{width:100%;border-collapse:collapse} th,td{text-align:left;padding:14px 16px;border-top:1px solid #eef2f7;font-size:14px;vertical-align:top} thead th{border-top:0;background:#f8fbfe;color:var(--muted);font-weight:700}
.toolbar{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)} .formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.input,select,textarea{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:18px;background:#fff} .sectionTitle{font-size:24px;font-weight:700;margin-bottom:6px}
.tag{display:inline-block;padding:5px 9px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700;margin-right:6px;margin-bottom:6px}
.tree details{border:1px solid var(--line);border-radius:18px;padding:12px 14px;background:#fff}
.tree details + details{margin-top:10px}
.tree summary{cursor:pointer;font-weight:700}
@media (max-width:980px){.hero{grid-template-columns:1fr} .title{font-size:40px} .navLayout{grid-template-columns:1fr} .sidebar{display:none} .grid4{grid-template-columns:1fr 1fr}}
@media (max-width:640px){.grid2,.grid4,.formGrid{grid-template-columns:1fr} .title{font-size:34px}}
</style>
</head>

      </div>
      <div class="card panelCard">
        <div class="sectionTitle">Ostatnie wpisy dozoru</div>
        <div class="stack" style="margin-top:14px">
          ${[
            ['2026-04-16 08:15','O₂','Jan Kowalski'],
            ['2026-04-16 07:52','AIR','Piotr Nowak'],
            ['2026-04-15 21:10','VAC','Marek Zieliński']
          ].map(d=>`<div style="padding:14px 16px;border:1px solid #e5edf5;border-radius:18px"><b>${d[1]}</b><div class="small" style="margin-top:6px">${d[0]} • ${d[2]}</div></div>`).join('')}
        </div>
      </div>
    </div>`;
}

function treeView() {
  let html = `<div class="tree">`;
  Object.keys(TREE).sort().forEach(building => {
    html += `<details open><summary>Budynek ${building}</summary><div class="stack" style="margin-top:12px">`;
    Object.keys(TREE[building]).forEach(unit => {
      html += `<details><summary>${unit}</summary><div class="small" style="margin-top:10px">${TREE[building][unit].length} pomieszczeń / lokalizacji</div><div style="margin-top:10px">`;
      TREE[building][unit].forEach(p => {
        const gases = p.gazy.map(g=>`${g.gaz} (${g.ilosc})`).join(' • ');
        html += `<div style="padding:10px 12px;border:1px solid var(--line);border-radius:14px;margin-bottom:8px"><b>${p.nr}</b> — ${p.nazwa}<div class="small">${gases || 'Brak gazów'}</div></div>`;
      });
      html += `</div></details>`;
    });
    html += `</div></details>`;
  });
  html += `</div>`;
  return html;
}

function panelView() {
  const menu = [
    ['dashboard','Dashboard'],
    ['drzewo','Budynki i oddziały'],
    ['skrzynki','Skrzynki odcinające'],
    ['punkty','Punkty poboru'],
    ['dtr','Dokumentacja DTR'],
    ['raporty','Raporty PDF']
  ];
  const q = state.query.toLowerCase();
  const filteredBoxes = BOXES.filter(x => JSON.stringify(x).toLowerCase().includes(q));
  const filteredPoints = POINTS.filter(x => JSON.stringify(x).toLowerCase().includes(q));

  let title = 'Dashboard';
  let content = dashboardView(filteredBoxes, filteredPoints);

  if (state.menu === 'skrzynki') {
    title = 'Skrzynki odcinające';
    content = table('Lista skrzynek', filteredBoxes, [
      ['nr','Numer'],['budynek','Budynek'],['poziom','Poziom'],['oddzial','Oddział'],['gazy','Gazy'],['wynik','Wynik']
    ]);
  }
  if (state.menu === 'punkty') {
    title = 'Punkty poboru';
    const rows = filteredPoints.map(p => {
      const gases = p.gazy.map(g => `${g.gaz} (${g.ilosc})`).join(' • ');
      return {
        nr: p.nr, budynek: p.budynek, oddzial: p.oddzial, nazwa: p.nazwa, miejsce: p.miejsce, gazy: gases, wynik: p.wynik
      };
    });
    content = table('Lista punktów poboru', rows, [
      ['nr','Numer'],['budynek','Budynek'],['oddzial','Oddział'],['nazwa','Nazwa'],['miejsce','Miejsce'],['gazy','Gazy'],['wynik','Wynik']
    ]);
  }
  if (state.menu === 'drzewo') {
    title = 'Budynki i oddziały';
    content = treeView();
  }
  if (state.menu === 'dtr') {
    title = 'Dokumentacja DTR';
    content = `<div class="grid2">
      <div class="card panelCard"><div class="sectionTitle">DTR tablica redukcyjna TRI/TC</div><div class="panelSub">Instrukcja techniczna urządzenia.</div></div>
      <div class="card panelCard"><div class="sectionTitle">DTR bateria butlowa BP</div><div class="panelSub">Opis budowy i obsługi.</div></div>
      <div class="card panelCard"><div class="sectionTitle">DTR łącznik butlowy</div><div class="panelSub">Instrukcja serwisowa i montażowa.</div></div>
      <div class="card panelCard"><div class="sectionTitle">Protokoły serwisowe</div><div class="panelSub">Archiwum PDF i wpisy robocze.</div></div>
    </div>`;
  }
  if (state.menu === 'raporty') {
    title = 'Raporty PDF';
    content = `<div class="card panelCard"><div class="sectionTitle">Eksporty i raporty</div><div class="row" style="margin-top:16px">
      <button class="btn btnDark">Raport dziennika dozoru</button>
      <button class="btn btnGhost">Raport skrzynki</button>
      <button class="btn btnGhost">Raport punktu poboru</button>
    </div></div>`;
  }

  return `${ekg()}<div class="page navLayout">
    <aside class="sidebar">
      ${logo()}
      <div style="margin-top:18px;padding:14px 16px;border-radius:18px;background:#f1f5f9" class="small"><b style="display:block;color:#0f172a;margin-bottom:6px">Zalogowano jako</b>${state.role}</div>
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
        ${menu.map(m=>`<button class="navBtn ${state.menu===m[0]?'active':''}" onclick="setMenu('${m[0]}')"><span>${m[1]}</span><span>›</span></button>`).join('')}
      </div>
      <button class="btn btnGhost" style="margin-top:20px" onclick="go('start')">Wyloguj</button>
    </aside>
    <main>
      <div class="topbar">
        <div><div style="font-size:28px;font-weight:700">${title}</div><div class="small">Szpital Czerniakowski • L’Ariess Medical SGM</div></div>
        <input class="search" placeholder="Szukaj: skrzynka, punkt, sala, oddział, gaz..." value="${state.query}" oninput="setQuery(this.value)">
      </div>
      <div class="content">${content}</div>
    </main>
  </div>`;
}

function render() {
  app.innerHTML = state.view === 'start' ? startView() : state.view === 'login' ? loginView() : state.view === 'dozor' ? dozorView() : panelView();
}
render();
</script>
</body>
</html>
